<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Giám Sát Xưởng In - Tinh Gọn (v12.3)</title>
    <style>
        :root {
            --bg-main: #f1f5f9;   
            --bg-card: #ffffff;   
            --text-main: #0f172a; 
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            
            --status-running: #10b981; 
            --status-setup: #eab308;   
            --status-size: #f97316;    
            --status-ink: #06b6d4;     
            --status-down: #ef4444;    
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { background-color: var(--bg-main); color: var(--text-main); padding: 10px; min-height: 100vh; display: flex; flex-direction: column; }

        header { display: flex; flex-direction: column; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; gap: 4px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        header h1 { font-size: 15px; font-weight: 700; color: #0f172a; }
        
        .auth-zone { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .user-status { font-size: 11px; font-weight: 600; color: #2563eb; background: #dbeafe; padding: 4px 8px; border-radius: 4px; }
        .btn-auth { padding: 4px 10px; font-size: 11px; font-weight: 600; border: 1px solid #cbd5e1; background: #fff; border-radius: 4px; cursor: pointer; }

        .stats-bar { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; margin: 8px 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8fafc; padding: 6px 2px; border-radius: 6px; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .stat-item.active-filter { background-color: #e2e8f0; border-color: #2563eb; }
        .stat-val { font-size: 14px; font-weight: 700; }
        .stat-lbl { font-size: 10px; color: var(--text-muted); font-weight: 600; }

        .text-running { color: var(--status-running); }
        .text-setup { color: #b45309; } 
        .text-size { color: var(--status-size); }
        .text-ink { color: var(--status-ink); }
        .text-down { color: var(--status-down); }

        .section-title { font-size: 12px; font-weight: 700; margin: 10px 0 6px 0; padding-left: 6px; border-left: 3px solid #2563eb; color: #2563eb; }
        .machine-grid { display: grid; gap: 8px; width: 100%; }
        
        #carousel-container { grid-template-columns: repeat(2, 1fr); }
        #oval-container { grid-template-columns: repeat(2, 1fr); }

        .machine-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .machine-card.hidden-by-filter { display: none !important; }

        .machine-header { padding: 6px 8px; font-weight: 700; font-size: 12px; color: #ffffff; display: flex; justify-content: space-between; align-items: center; }
        .machine-timer { font-family: monospace; font-size: 10px; background-color: rgba(0, 0, 0, 0.2); padding: 2px 4px; border-radius: 3px; }

        .bg-running { background-color: var(--status-running); color: #fff; }
        .bg-setup { background-color: var(--status-setup); color: #0f172a !important; }
        .bg-size { background-color: var(--status-size); color: #fff; }
        .bg-ink { background-color: var(--status-ink); color: #fff; }
        .bg-down { background-color: var(--status-down); color: #fff; }

        .machine-body { padding: 6px 8px; font-size: 11.5px; display: flex; flex-direction: column; gap: 4px; background-color: #ffffff; }
        .job-code { font-weight: 700; font-size: 12.5px; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .job-detail { font-size: 10.5px; line-height: 1.3; }
        .job-detail div { display: flex; margin-bottom: 1px; }
        .job-detail span { color: var(--text-muted); width: 55px; flex-shrink: 0; }
        .job-detail b { color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* KHU VỰC CHỮ TRẠNG THÁI CHÍNH XÁC */
        .status-display-text { font-size: 11px; font-weight: 700; text-align: center; padding: 4px 0; margin-top: 2px; border-top: 1px dashed #e2e8f0; }

        /* CẤU HÌNH TRÊN PC / TV TỔNG XƯỞNG */
        @media (min-width: 1024px) {
            body { padding: 4px 10px; height: 100vh; width: 100vw; overflow: hidden; }
            header { flex-direction: row; justify-content: space-between; align-items: center; height: 4vh; padding-bottom: 0; }
            .stats-bar { grid-template-columns: repeat(6, 1fr); height: 5.5vh; margin: 4px 0; padding: 2px 10px; }
            .stat-item { flex-direction: row; gap: 8px; padding: 2px; }
            .stat-val { font-size: 15px; }
            .section-title { margin: 2px 0; height: 2vh; font-size: 11px; }
            .zone-carousel { height: 29vh; margin-bottom: 2px; } 
            .zone-oval { height: 53vh; }     
            #carousel-container { grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(2, 1fr); }
            #oval-container { grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(3, 1fr); }
            .machine-card { justify-content: space-between; height: 100%; }
            .machine-header { padding: 2px 6px; font-size: 10.5px; }
            .machine-body { padding: 3px 6px; font-size: 10.5px; justify-content: space-between; height: 100%; gap: 0; }
            .job-code { font-size: 11.5px; }
            .job-detail { font-size: 9.5px; line-height: 1.15; }
            .job-detail span { width: 50px; }
            .status-display-text { font-size: 10px; padding: 2px 0; }
        }

        /* POPUP MODAL ĐÃ TINH GỌN */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: 1000; padding: 10px; overflow-y: auto; }
        .modal-box { position: relative; margin: 5vh auto; background-color: #ffffff; border: 1px solid #cbd5e1; border-radius: 10px; padding: 14px; width: 100%; max-width: 420px; color: #0f172a; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .modal-box h3 { font-size: 13px; font-weight: 700; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; margin-bottom: 10px; }
        .form-group { margin-bottom: 8px; }
        .form-group label { display: block; font-size: 10px; color: #475569; margin-bottom: 2px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 7px; background-color: #ffffff; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 12px; color: #0f172a; }
        .form-row { display: flex; gap: 6px; }
        .modal-buttons { display: flex; justify-content: space-between; margin-top: 12px; border-top: 1px solid #e2e8f0; padding-top: 8px; }
        .right-buttons { display: flex; gap: 6px; }
        .btn { padding: 7px 12px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 11.5px; }
        .btn-clear { background-color: #fee2e2; color: #dc2626; }
        .btn-cancel { background-color: #e2e8f0; color: #475569; }
        .btn-save { background-color: #2563eb; color: white; }
        .modal-current-timer { font-size: 11px; color: #ef4444; font-weight: bold; margin-bottom: 8px; text-align: center; background: #fef2f2; padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>HỆ THỐNG GIÁM SÁT XƯỞNG IN (BẢN V12.3)</h1>
            <div class="auth-zone">
                <span class="user-status" id="txtUser">Chế độ: Xem dữ liệu</span>
                <button class="btn-auth" id="btnLoginToggle" onclick="handleSimpleAuth()">Đăng nhập</button>
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stat-item active-filter" onclick="setFilter('all', this)"><div class="stat-lbl">Tổng máy:</div><div class="stat-val" id="total-machines">28</div></div>
        <div class="stat-item" onclick="setFilter('running', this)"><div class="stat-lbl">🟢 Chạy hàng:</div><div class="stat-val text-running" id="count-running">0</div></div>
        <div class="stat-item" onclick="setFilter('setup', this)"><div class="stat-lbl">🟡 Thay đơn:</div><div class="stat-val text-setup" id="count-setup">0</div></div>
        <div class="stat-item" onclick="setFilter('size', this)"><div class="stat-lbl">🟠 Thay size:</div><div class="stat-val text-size" id="count-size">0</div></div>
        <div class="stat-item" onclick="setFilter('ink', this)"><div class="stat-lbl">🔵 Chỉnh mực:</div><div class="stat-val text-ink" id="count-ink">0</div></div>
        <div class="stat-item" onclick="setFilter('down', this)"><div class="stat-lbl">🔴 Sự cố/Dừng:</div><div class="stat-val text-down" id="count-down">0</div></div>
    </div>

    <div class="section-title">KHU MÁY TRÒN CAROUSEL</div>
    <div class="zone-carousel"><div class="machine-grid" id="carousel-container"></div></div>

    <div class="section-title">KHU MÁY DÀI OVAL</div>
    <div class="zone-oval"><div class="machine-grid" id="oval-container"></div></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3 id="modalTitle">Cập nhật Máy</h3>
            <div class="modal-current-timer" id="modalTimerDisplay">Thời gian: 00:00:00</div>
            
            <div class="form-group"><label>TRẠNG THÁI MÁY</label>
                <select id="inputStatus">
                    <option value="running">🟢 Đang chạy hàng (Production)</option>
                    <option value="setup">🟡 Đang thay đơn / Lên khung (Setup)</option>
                    <option value="size">🟠 Đang thay size / Chỉnh gá (Size Change)</option>
                    <option value="ink">🔵 Đang chỉnh mực (Ink Adjust)</option>
                    <option value="down">🔴 Máy dừng / Gặp sự cố (Downtime)</option>
                </select>
            </div>
            <div class="form-group"><label>TÊN KHÁCH HÀNG</label>
                <select id="inputCustomer">
                    <option value="Chưa cập nhật dữ liệu">Chưa cập nhật dữ liệu</option>
                    <option value="UT">UT</option><option value="UQ">UQ</option><option value="ANF">ANF</option><option value="NIKE">NIKE</option><option value="ATY">ATY</option><option value="Other">Other</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group" style="flex: 1;"><label>MÃ ĐƠN (MO)</label><input type="text" id="inputMO"></div>
                <div class="form-group" style="flex: 1;"><label>STYLE (MÃ MẪU)</label><input type="text" id="inputStyle"></div>
            </div>
            <div class="form-group"><label>CHI TIẾT VỊ TRÍ IN</label>
                <select id="inputPrintDetail">
                    <option value="Thân trước">Thân trước</option><option value="Thân sau">Thân sau</option><option value="Tay trái">Tay trái</option><option value="Tay phải">Tay phải</option><option value="Ngực trái">Ngực trái</option><option value="Ngực phải">Ngực phải</option>
                </select>
            </div>
            <div class="form-group"><label>KÍCH THƯỚC FILM</label><input type="text" id="inputFilmSize"></div>
            
            <div class="modal-buttons">
                <button class="btn btn-clear" id="btnClear">Xóa trắng máy</button>
                <div class="right-buttons">
                    <button class="btn btn-cancel" id="btnCancel">Hủy</button>
                    <button class="btn btn-save" id="btnSave">Cập nhật</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAHXYx6bqDTw6tpbIaLwzCAzxOyBbge6b4",
            authDomain: "machineprt.firebaseapp.com",
            projectId: "machineprt",
            storageBucket: "machineprt.firebasestorage.app",
            messagingSenderId: "137644684073",
            appId: "1:137644684073:web:6696a4e7b29923f0d57d38",
            databaseURL: "https://machineprt-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const machinesRef = ref(database, 'machines');

        let dbLocal = {};
        let selectedMachineId = null;
        let currentFilterStatus = 'all';
        let currentAssignedMachine = null;

        if (localStorage.getItem('xuongin_machine')) {
            currentAssignedMachine = localStorage.getItem('xuongin_machine');
            document.getElementById('txtUser').innerText = currentAssignedMachine === 'ADMIN' ? "Quyền: Quản Lý Tổng" : `Máy: MÁY ${currentAssignedMachine}`;
            document.getElementById('btnLoginToggle').innerText = "Đăng xuất";
        }

        window.handleSimpleAuth = function() {
            if (currentAssignedMachine) {
                localStorage.removeItem('xuongin_machine');
                currentAssignedMachine = null;
                document.getElementById('txtUser').innerText = "Chế độ: Xem dữ liệu";
                document.getElementById('btnLoginToggle').innerText = "Đăng nhập";
            } else {
                const username = prompt("Nhập Tên Máy (ví dụ: mayc1, mayo2):").toLowerCase().trim();
                if (!username) return;
                const password = prompt("Nhập mật khẩu (ví dụ: 123):");
                if (password !== '123') { alert("Sai mật khẩu xưởng!"); return; }

                if (username === 'admin') {
                    currentAssignedMachine = 'ADMIN';
                } else {
                    const prefix = username.startsWith('mayc') ? 'C' : 'O';
                    const num = username.replace('mayc', '').replace('mayo', '');
                    if (!num || isNaN(num)) { alert("Tên máy sai định dạng!"); return; }
                    currentAssignedMachine = prefix + String(num).padStart(2, '0');
                }

                localStorage.setItem('xuongin_machine', currentAssignedMachine);
                document.getElementById('txtUser').innerText = currentAssignedMachine === 'ADMIN' ? "Quyền: Quản Lý Tổng" : `Máy: MÁY ${currentAssignedMachine}`;
                document.getElementById('btnLoginToggle').innerText = "Đăng xuất";
            }
        };

        window.setFilter = function(status, element) {
            currentFilterStatus = status;
            document.querySelectorAll('.stat-item').forEach(item => item.classList.remove('active-filter'));
            element.classList.add('active-filter');
            applyFilterToCards();
        };

        function applyFilterToCards() {
            Object.keys(dbLocal).forEach(id => {
                const card = document.getElementById(`card-${id}`);
                if (!card) return;
                if (currentFilterStatus === 'all' || dbLocal[id].status === currentFilterStatus) {
                    card.classList.remove('hidden-by-filter');
                } else {
                    card.classList.add('hidden-by-filter');
                }
            });
        }

        function formatDuration(startMs) {
            if (!startMs) return "00:00:00";
            const diffSec = Math.floor((Date.now() - startMs) / 1000);
            if (diffSec < 0) return "00:00:00";
            const hrs = Math.floor(diffSec / 3600);
            const mins = Math.floor((diffSec % 3600) / 60);
            return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(diffSec % 60).padStart(2, '0')}`;
        }

        onValue(machinesRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            dbLocal = data;
            renderDashboard(data);
        });

        // CẬP NHẬT PHẦN HIỂN THỊ CHỮ TRẠNG THÁI RÕ RÀNG
        function renderDashboard(data) {
            const carouselContainer = document.getElementById('carousel-container');
            const ovalContainer = document.getElementById('oval-container');
            carouselContainer.innerHTML = ""; ovalContainer.innerHTML = "";

            let counts = { running: 0, setup: 0, size: 0, ink: 0, down: 0 };

            Object.keys(data).sort().forEach(id => {
                const machine = data[id];
                counts[machine.status]++;

                let statusLabel = "Đang chờ";
                if (machine.status === 'running') statusLabel = "Đang chạy hàng";
                else if (machine.status === 'setup') statusLabel = "Thay đơn";
                else if (machine.status === 'size') statusLabel = "Thay size";
                else if (machine.status === 'ink') statusLabel = "Chỉnh mực";
                else if (machine.status === 'down') statusLabel = "Sự cố";

                const card = document.createElement('div');
                card.className = 'machine-card'; card.id = `card-${id}`;
                card.addEventListener('click', () => openModal(id));
                card.innerHTML = `
                    <div class="machine-header bg-${machine.status}"><span>MÁY ${machine.id}</span><span class="machine-timer" id="timer-${id}">${formatDuration(machine.statusStartTime)}</span></div>
                    <div class="machine-body">
                        <div class="job-code">${machine.style || '---'}</div>
                        <div class="job-detail">
                            <div><span>Khách:</span><b style="color: #475569;">${machine.customer || '---'}</b></div>
                            <div><span>Mã đơn:</span><b>${machine.mo || '---'}</b></div>
                            <div><span>Vị trí:</span><b>${machine.printDetail || '---'}</b></div>
                            <div><span>Khổ Film:</span><b>${machine.filmSize || '---'}</b></div>
                        </div>
                        <div class="status-display-text" style="color:var(--status-${machine.status});">
                            ${statusLabel}
                        </div>
                    </div>`;
                if (id.startsWith('C')) carouselContainer.appendChild(card); else ovalContainer.appendChild(card);
            });

            document.getElementById('total-machines').innerText = Object.keys(data).length;
            document.getElementById('count-running').innerText = counts.running;
            document.getElementById('count-setup').innerText = counts.setup;
            document.getElementById('count-size').innerText = counts.size;
            document.getElementById('count-ink').innerText = counts.ink;
            document.getElementById('count-down').innerText = counts.down;
            applyFilterToCards();
        }

        function openModal(id) {
            if (!currentAssignedMachine) { alert("Bạn chưa đăng nhập!"); return; }
            if (currentAssignedMachine !== 'ADMIN' && currentAssignedMachine !== id) {
                alert(`Điện thoại bạn gán cho MÁY ${currentAssignedMachine}. Không thể sửa MÁY ${id}!`); return;
            }

            selectedMachineId = id;
            const m = dbLocal[id];
            document.getElementById('modalTitle').innerText = `CẬP NHẬT: MÁY ${id}`;
            document.getElementById('inputStatus').value = m.status;
            document.getElementById('inputCustomer').value = m.customer || 'Chưa cập nhật dữ liệu';
            document.getElementById('inputMO').value = (m.mo !== '---' && m.mo !== 'Chưa cập nhật dữ liệu') ? m.mo : '';
            document.getElementById('inputStyle').value = (m.style !== '---' && m.style !== 'Chưa cập nhật dữ liệu') ? m.style : '';
            document.getElementById('inputPrintDetail').value = m.printDetail || 'Thân trước';
            document.getElementById('inputFilmSize').value = m.filmSize !== '---' ? m.filmSize : '';
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; selectedMachineId = null; }

        function saveMachineData() {
            if (!selectedMachineId) return;
            const oldS = dbLocal[selectedMachineId].status;
            const newS = document.getElementById('inputStatus').value;
            let startTime = oldS !== newS ? Date.now() : dbLocal[selectedMachineId].statusStartTime;

            const machineUpdates = {
                status: newS, statusStartTime: startTime,
                customer: document.getElementById('inputCustomer').value,
                mo: document.getElementById('inputMO').value || '---',
                style: document.getElementById('inputStyle').value || '---',
                printDetail: document.getElementById('inputPrintDetail').value,
                filmSize: document.getElementById('inputFilmSize').value || '---'
            };

            update(ref(database, `machines/${selectedMachineId}`), machineUpdates).then(() => { closeModal(); });
        }

        function clearAllFields() {
            if(confirm("Bạn có chắc chắn muốn xóa dữ liệu máy này?")) {
                document.getElementById('inputCustomer').value = 'Chưa cập nhật dữ liệu';
                document.getElementById('inputMO').value = ''; 
                document.getElementById('inputStyle').value = 'Chưa cập nhật dữ liệu'; 
                document.getElementById('inputFilmSize').value = '---'; 
                document.getElementById('inputStatus').value = 'setup';
            }
        }

        document.getElementById('btnSave').addEventListener('click', saveMachineData);
        document.getElementById('btnCancel').addEventListener('click', closeModal);
        document.getElementById('btnClear').addEventListener('click', clearAllFields);
        setInterval(() => {
            Object.keys(dbLocal).forEach(id => { const el = document.getElementById(`timer-${id}`); if (el) el.innerText = formatDuration(dbLocal[id].statusStartTime); });
        }, 1000);
    </script>
</body>
</html>
